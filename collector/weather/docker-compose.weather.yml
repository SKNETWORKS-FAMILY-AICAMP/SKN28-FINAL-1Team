services:
  weather-db:
    image: postgres:16
    container_name: weather-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - weather_db_data:/var/lib/postgresql/data

  weather-collector:
    build:
      context: .
      dockerfile: Dockerfile.weather
    container_name: weather-collector
    restart: unless-stopped
    depends_on:
      - weather-db
    environment:
      TZ: Asia/Seoul
      KMA_AUTH_KEY: ${KMA_AUTH_KEY}
      KMA_AUTH_PARAM_NAME: ${KMA_AUTH_PARAM_NAME:-authKey}
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: weather-db
      POSTGRES_PORT: 5432
      GRID_FILE_PATH: /app/data/동네예보지점좌표(위경도)_202601.xlsx
      MID_LAND_AREA_FILE: /app/data/mid_land_areas.json
      MID_TEMP_AREA_FILE: /app/data/mid_temp_areas.json
      # 실제 APIHub 신청 URL이 다르면 아래 값들을 .env에서 덮어쓴다.
      ODAM_GRID_URL: ${ODAM_GRID_URL:-https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_odam_grd}
      VSRT_GRID_URL: ${VSRT_GRID_URL:-https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_vsrt_grd}
      SHRT_GRID_URL: ${SHRT_GRID_URL:-https://apihub.kma.go.kr/api/typ01/cgi-bin/url/nph-dfs_shrt_grd}
      MID_LAND_URL: ${MID_LAND_URL:-}
      MID_TEMP_URL: ${MID_TEMP_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data:ro
    # 로컬 테스트용: Django migration을 쓰는 경우 --init-schema는 제거하고, migration 이후 --sync-areas만 실행한다.
    command: >
      sh -c "python /app/weather_collector_db.py --init-schema --sync-areas &&
             python /app/weather_collector_db.py --scheduler"

volumes:
  weather_db_data:
