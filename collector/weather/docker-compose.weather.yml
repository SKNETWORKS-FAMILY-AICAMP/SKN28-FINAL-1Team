# .env는 항상 프로젝트 루트의 .env를 사용한다 (env_file: ../../.env).
# env_file 경로는 이 compose 파일 기준 상대경로라서 어느 디렉터리에서 실행해도 동일하다.
# 주의: ${VAR} 보간은 "실행 시 프로젝트 디렉터리"의 .env를 읽어 위치 의존이 생기므로
#       이 파일에서는 사용하지 않는다. 값 변경은 루트 .env에서 한다.
services:
  weather-db:
    image: postgres:16
    container_name: weather-db
    restart: unless-stopped
    env_file:
      - ../../.env            # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - weather_db_data:/var/lib/postgresql/data

  weather-collector:
    build:
      context: .
      dockerfile: Dockerfile.weather
    container_name: weather-collector
    restart: unless-stopped
    depends_on:
      - weather-db
    env_file:
      - ../../.env            # KMA_AUTH_KEY, POSTGRES_*, MID_*_URL, LOG_LEVEL 등
    # environment는 env_file보다 우선한다. 컨테이너 전용 고정값만 여기에 둔다.
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: weather-db
      POSTGRES_PORT: 5432
      GRID_FILE_PATH: /app/data/동네예보지점좌표(위경도)_202601.xlsx
      MID_LAND_AREA_FILE: /app/data/mid_land_areas.json
      MID_TEMP_AREA_FILE: /app/data/mid_temp_areas.json
    volumes:
      - ./data:/app/data:ro
    # 로컬 테스트용: Django migration을 쓰는 경우 --init-schema는 제거하고, migration 이후 --sync-areas만 실행한다.
    command: >
      sh -c "python /app/weather_collector_db.py --init-schema --sync-areas &&
             python /app/weather_collector_db.py --scheduler"

volumes:
  weather_db_data:
