# .env는 항상 프로젝트 루트의 .env를 사용한다 (env_file: ../../.env).
# env_file 경로는 이 compose 파일 기준 상대경로라서 어느 디렉터리에서 실행해도 동일하다.
# 주의: ${VAR} 보간은 "실행 시 프로젝트 디렉터리"의 .env를 읽어 위치 의존이 생기므로
#       이 파일에서는 사용하지 않는다. 값 변경은 루트 .env에서 한다.
services:
  naver-db:
    image: postgres:16
    container_name: naver-db
    restart: unless-stopped
    env_file:
      - ../../.env            # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - naver_db_data:/var/lib/postgresql/data

  naver-collector:
    build:
      context: .
      dockerfile: Dockerfile.naver
    container_name: naver-collector
    restart: unless-stopped
    depends_on:
      - naver-db
    env_file:
      - ../../.env            # NAVER_*, OPENAI_*, POSTGRES_*, LOG_LEVEL 등
    # environment는 env_file보다 우선한다. 컨테이너 전용 고정값만 여기에 둔다.
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: naver-db
      POSTGRES_PORT: 5432
    # 로컬 테스트용: 운영 전환 시 --init-schema는 Django migration으로 대체한다.
    command: >
      sh -c "python /app/naver_collector_db.py --init-schema &&
             python /app/naver_collector_db.py --scheduler"

volumes:
  naver_db_data:
