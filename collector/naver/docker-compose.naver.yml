# [단독 실행 전용] 통합 운영은 루트 docker-compose.yml(profile: naver)을 사용한다.
# 이 파일은 naver 스택만 따로 띄울 때 쓰며, 루트 스택과 동시에 실행하면
# 호스트 5432 포트가 충돌한다. DB 볼륨도 루트와 분리되어 있다(naver_db_data).
#
# .env는 항상 프로젝트 루트의 .env를 사용한다 (env_file: ../../.env).
# env_file 경로는 이 compose 파일 기준 상대경로라서 어느 디렉터리에서 실행해도 동일하다.
# 주의: ${VAR} 보간은 "실행 시 프로젝트 디렉터리"의 .env를 읽어 위치 의존이 생기므로
#       이 파일에서는 사용하지 않는다. 값 변경은 루트 .env에서 한다.
services:
  naver-db:
    image: postgres:16
    container_name: naver-db
    restart: unless-stopped
    env_file:
      - ../../.env            # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - naver_db_data:/var/lib/postgresql/data

  naver-collector:
    build:
      # 공용 util 패키지 포함을 위해 컨텍스트는 상위(collector/)
      context: ..
      dockerfile: naver/Dockerfile.naver
      args:
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
    container_name: naver-collector
    restart: unless-stopped
    depends_on:
      - naver-db
    env_file:
      - ../../.env            # NAVER_*, OPENAI_*, POSTGRES_*, LOG_LEVEL 등
    # environment는 env_file보다 우선한다. 컨테이너 전용 고정값만 여기에 둔다.
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: naver-db
      POSTGRES_PORT: 5432
    # 스키마는 Django migration(api/apps/catalog)이 관리한다.
    # 이 단독 스택의 naver-db에는 api/에서 해당 DB를 가리키게 한 뒤 migrate를 먼저 적용해야 한다.
    command: python /app/naver/naver_collector_db.py --scheduler

volumes:
  naver_db_data:
