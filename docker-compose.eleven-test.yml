name: skn28-eleven-test

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${ELEVEN_TEST_POSTGRES_DB:-fashion_eleven_test}
    ports:
      - "${ELEVEN_TEST_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - eleven_test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./api
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${ELEVEN_TEST_POSTGRES_DB:-fashion_eleven_test}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py migrate --noinput

  eleven-collector:
    build:
      context: ./collector
      dockerfile: eleven/Dockerfile.eleven
      args:
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${ELEVEN_TEST_POSTGRES_DB:-fashion_eleven_test}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python /app/eleven/eleven_collector_db.py --help

volumes:
  eleven_test_postgres_data:
    name: skn28-eleven-test-postgres-data
