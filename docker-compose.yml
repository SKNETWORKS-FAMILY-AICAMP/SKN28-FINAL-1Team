# ============================================================
# 통합 compose: db + api + weather-collector + naver-collector
#
# 모든 서비스는 profiles로 선택 실행한다. db는 어떤 스택을 켜도 함께 뜬다.
#
#   docker compose --profile api up -d                  # db + api
#   docker compose --profile naver up -d                # db + naver collector
#   docker compose --profile weather --profile api up -d
#   docker compose --profile all up -d --build          # 4개 전부
#
# .env에 COMPOSE_PROFILES=api,naver 처럼 지정하면 --profile 없이 up만으로 동작.
# 환경변수는 프로젝트 루트 .env 하나로 관리한다 (이 파일이 루트에 있으므로
# ${} 보간과 env_file 모두 루트 .env를 읽는다).
#
# API 실행 모드는 DJANGO_SETTINGS_MODULE 환경변수로 제어한다
# (별도 compose 파일 없음 — 구 docker-compose.swagger.yml은 여기로 병합됨):
#   config.settings.prod           운영 (기본값)
#   config.settings.dev            로컬 개발
#   config.settings.swagger        + Swagger UI (/api/docs/)
#   config.settings.swagger_noauth + Swagger UI + 인증 우회 (로컬 전용, 프로덕션 금지)
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: skn28-postgres
    restart: unless-stopped
    profiles: ["db", "api", "weather", "naver", "eleven", "all"]
    env_file:
      - .env                  # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      TZ: Asia/Seoul
    ports:
      # 호스트에 로컬 PostgreSQL이 떠 있으면 .env에서 POSTGRES_HOST_PORT를 바꿔
      # 충돌을 피한다 (구 swagger compose의 ports !reset 대체).
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$: 컨테이너 내부 환경변수 참조 (compose 보간 아님)
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # one-shot 마이그레이션. 모든 스택(api/collector)이 이 서비스 완료 후 시작한다.
  # 스키마 소유권: Django migration (users/catalog/weather 앱)
  migrate:
    build:
      context: ./api
    container_name: skn28-migrate
    restart: "no"
    profiles: ["api", "weather", "naver", "eleven", "all"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
    command: python manage.py migrate --noinput

  api:
    build:
      context: ./api
    container_name: skn28-api
    restart: unless-stopped
    profiles: ["api", "all"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env                  # DJANGO_*, *_OAUTH_*, POSTGRES_* 등
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS:-3}"

  weather-collector:
    build:
      context: ./collector/weather
      dockerfile: Dockerfile.weather
    container_name: weather-collector
    restart: unless-stopped
    profiles: ["weather", "all"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env                  # KMA_AUTH_KEY, MID_*_URL, POSTGRES_* 등
    environment:              # env_file보다 우선하는 컨테이너 전용 고정값
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      GRID_FILE_PATH: /app/data/동네예보지점좌표(위경도)_202601.xlsx
      MID_LAND_AREA_FILE: /app/data/mid_land_areas.json
      MID_TEMP_AREA_FILE: /app/data/mid_temp_areas.json
    volumes:
      - ./collector/weather/data:/app/data:ro
    # 스키마는 migrate 서비스(Django migration)가 생성한다.
    command: >
      sh -c "python /app/weather_collector_db.py --sync-areas &&
             python /app/weather_collector_db.py --scheduler"

  naver-collector:
    build:
      # 공용 util 패키지 포함을 위해 컨텍스트는 collector/ 전체
      context: ./collector
      dockerfile: naver/Dockerfile.naver
      args:
        # Claude provider 사용 시 true (Claude Code CLI 설치)
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
    container_name: naver-collector
    restart: unless-stopped
    profiles: ["naver", "all"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env                  # NAVER_*, OPENAI_*, POSTGRES_* 등
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    # 스키마는 migrate 서비스(Django migration)가 생성한다.
    command: python /app/naver/naver_collector_db.py --scheduler

  eleven-collector:
    build:
      context: ./collector
      dockerfile: eleven/Dockerfile.eleven
      args:
        # Claude provider 사용 시 true (Claude Code CLI 설치)
        INSTALL_CLAUDE_CLI: ${INSTALL_CLAUDE_CLI:-false}
    container_name: eleven-collector
    restart: unless-stopped
    profiles: ["eleven", "all"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: python /app/eleven/eleven_collector_db.py --scheduler

volumes:
  postgres_data:
