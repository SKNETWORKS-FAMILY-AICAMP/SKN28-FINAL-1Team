<svg viewBox="0 0 1360 930" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Noto Sans KR','Apple SD Gothic Neo',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#546e7a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="930" fill="#ffffff"/>
  <text x="680" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">AI 개인화 패션 추천 시스템 아키텍처</text>

  <!-- ===== Client layer ===== -->
  <rect x="340" y="60" width="400" height="90" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="540" y="97" text-anchor="middle" font-size="16" font-weight="bold" fill="#0D47A1">모바일 앱 (Frontend)</text>
  <text x="540" y="122" text-anchor="middle" font-size="12.5" fill="#37474F">옷장 아이템 등록 · 체형 정보 입력 · 추천 요청/조회</text>

  <!-- Mobile -> Auth -->
  <line x1="460" y1="150" x2="255" y2="225" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="305" y="180" font-size="11.5" fill="#455A64" font-style="italic">로그인 / JWT 발급</text>
  <!-- Mobile -> API -->
  <line x1="620" y1="150" x2="730" y2="225" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="690" y="180" font-size="11.5" fill="#455A64" font-style="italic">API 요청 (JWT)</text>

  <!-- ===== Backend layer ===== -->
  <rect x="80" y="230" width="300" height="110" rx="10" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="230" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#880E4F">인증 서버 (Auth Server)</text>
  <text x="230" y="293" text-anchor="middle" font-size="12.5" fill="#37474F">회원가입 · 로그인</text>
  <text x="230" y="313" text-anchor="middle" font-size="12.5" fill="#37474F">JWT 발급 · 검증 (별도 서버)</text>

  <rect x="520" y="230" width="440" height="110" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="740" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B5E20">API 서버 (Django / DRF)</text>
  <text x="740" y="293" text-anchor="middle" font-size="12.5" fill="#37474F">옷장 · 사용자 · 체형 정보 관리</text>
  <text x="740" y="313" text-anchor="middle" font-size="12.5" fill="#37474F">추천 요청 오케스트레이션</text>

  <!-- API -> Auth -->
  <line x1="520" y1="285" x2="388" y2="285" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="454" y="275" text-anchor="middle" font-size="11.5" fill="#455A64" font-style="italic">토큰 검증</text>

  <!-- API -> AI -->
  <line x1="740" y1="340" x2="740" y2="395" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="752" y="372" font-size="11.5" fill="#455A64" font-style="italic">추천 요청 라우팅</text>

  <!-- ===== AI layer ===== -->
  <rect x="80" y="400" width="880" height="230" rx="10" fill="#FFF8F0" stroke="#E65100" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="100" y="428" font-size="15" font-weight="bold" fill="#E65100">AI 추천 엔진 (ml/)</text>

  <rect x="110" y="450" width="260" height="150" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.8"/>
  <text x="240" y="480" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#BF360C">① 코디 추천 RAG</text>
  <text x="240" y="507" text-anchor="middle" font-size="12" fill="#37474F">입력: 옷장 아이템</text>
  <text x="240" y="527" text-anchor="middle" font-size="12" fill="#37474F">컨텍스트: 오늘 날씨 + TPO</text>
  <text x="240" y="551" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">→ 옷장 내 코디 추천</text>

  <rect x="400" y="450" width="260" height="150" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.8"/>
  <text x="530" y="480" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#BF360C">② 신규 아이템 추천 RAG</text>
  <text x="530" y="507" text-anchor="middle" font-size="12" fill="#37474F">입력: 옷장 아이템 + 체형 정보</text>
  <text x="530" y="527" text-anchor="middle" font-size="12" fill="#37474F">상품 임베딩 유사도 검색</text>
  <text x="530" y="551" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">→ 새 의상 아이템 추천</text>

  <rect x="690" y="450" width="250" height="150" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.8"/>
  <text x="815" y="480" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#BF360C">③ 사이즈 추천</text>
  <text x="815" y="507" text-anchor="middle" font-size="12" fill="#37474F">입력: 체형 정보</text>
  <text x="815" y="527" text-anchor="middle" font-size="12" fill="#37474F">아이템 실측 데이터 매칭</text>
  <text x="815" y="551" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">→ 의복 사이즈 추천</text>

  <!-- AI -> External -->
  <line x1="960" y1="475" x2="1033" y2="475" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="996" y="465" text-anchor="middle" font-size="11" fill="#455A64" font-style="italic">① 날씨 조회</text>
  <line x1="960" y1="565" x2="1033" y2="565" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="996" y="555" text-anchor="middle" font-size="11" fill="#455A64" font-style="italic">①② 생성 요청</text>

  <!-- AI -> Data -->
  <line x1="180" y1="630" x2="180" y2="683" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="405" y1="630" x2="405" y2="683" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="630" y1="630" x2="630" y2="683" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="860" y1="630" x2="860" y2="683" stroke="#546e7a" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="195" y="662" font-size="11.5" fill="#455A64" font-style="italic">조회 · 저장</text>

  <!-- ===== Data layer ===== -->
  <rect x="80" y="690" width="200" height="110" rx="8" fill="#EDE7F6" stroke="#4527A0" stroke-width="1.8"/>
  <text x="180" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#311B92">PostgreSQL (RDS)</text>
  <text x="180" y="750" text-anchor="middle" font-size="11.5" fill="#37474F">사용자 · 옷장 아이템</text>
  <text x="180" y="768" text-anchor="middle" font-size="11.5" fill="#37474F">체형 정보</text>

  <rect x="310" y="690" width="190" height="110" rx="8" fill="#EDE7F6" stroke="#4527A0" stroke-width="1.8"/>
  <text x="405" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#311B92">Redis</text>
  <text x="405" y="750" text-anchor="middle" font-size="11.5" fill="#37474F">추천 결과 · 날씨 캐시</text>

  <rect x="530" y="690" width="200" height="110" rx="8" fill="#EDE7F6" stroke="#4527A0" stroke-width="1.8"/>
  <text x="630" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#311B92">Vector DB</text>
  <text x="630" y="750" text-anchor="middle" font-size="11.5" fill="#37474F">의류 · 상품 임베딩</text>
  <text x="630" y="768" text-anchor="middle" font-size="11.5" fill="#37474F">(RAG 검색 인덱스)</text>

  <rect x="760" y="690" width="200" height="110" rx="8" fill="#EDE7F6" stroke="#4527A0" stroke-width="1.8"/>
  <text x="860" y="725" text-anchor="middle" font-size="14" font-weight="bold" fill="#311B92">AWS S3</text>
  <text x="860" y="750" text-anchor="middle" font-size="11.5" fill="#37474F">의류 이미지</text>
  <text x="860" y="768" text-anchor="middle" font-size="11.5" fill="#37474F">메타 데이터</text>

  <!-- ===== External services ===== -->
  <text x="1040" y="425" font-size="15" font-weight="bold" fill="#616161">외부 서비스</text>
  <rect x="1040" y="440" width="270" height="70" rx="8" fill="#F5F5F5" stroke="#757575" stroke-width="1.8"/>
  <text x="1175" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">날씨 API</text>
  <text x="1175" y="493" text-anchor="middle" font-size="11.5" fill="#37474F">오늘의 날씨 조회</text>

  <rect x="1040" y="530" width="270" height="70" rx="8" fill="#F5F5F5" stroke="#757575" stroke-width="1.8"/>
  <text x="1175" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">LLM API</text>
  <text x="1175" y="583" text-anchor="middle" font-size="11.5" fill="#37474F">RAG 추천 문장 생성</text>

  <!-- ===== Infra ===== -->
  <rect x="1040" y="690" width="270" height="110" rx="8" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="1175" y="722" text-anchor="middle" font-size="14" font-weight="bold" fill="#795548">인프라</text>
  <text x="1175" y="748" text-anchor="middle" font-size="11.5" fill="#37474F">AWS: 프로덕션 배포 (EC2/ECS)</text>
  <text x="1175" y="768" text-anchor="middle" font-size="11.5" fill="#37474F">RunPod GPU: 모델 학습 · 실험 (임시)</text>

  <!-- Caption -->
  <text x="680" y="875" text-anchor="middle" font-size="12.5" fill="#607D8B">주요 흐름:  앱 로그인 → JWT 발급 → API 요청 → AI 추천 엔진 (RAG 검색 + 날씨/LLM 호출) → 결과 캐싱(Redis) → 앱 응답</text>
  <text x="680" y="900" text-anchor="middle" font-size="11.5" fill="#90A4AE">SKN28-FINAL-1Team · 2026-07-09</text>
</svg>
