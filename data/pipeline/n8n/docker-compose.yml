# n8n 셀프호스팅 — 데이터 분석 파이프라인 오케스트레이션용
# 실행: infisical run --env=dev -- docker compose up -d
# 비밀값(N8N_USER, N8N_PASSWORD, AWS_*)은 절대 이 파일에 하드코딩하지 말 것.
services:
  n8n:
    # 기본 n8n 이미지에는 python/uv/aws-cli 가 없으므로 Dockerfile 로 빌드해서 쓴다.
    build:
      context: .
      dockerfile: Dockerfile
    image: n8n-python:local
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # 타임존 (스케줄 트리거가 KST 기준으로 돌게)
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      # 인증: n8n 2.x 는 basic auth 가 제거됨 — 첫 접속 시 오너 계정을 만든다 (localhost 전용이므로 충분)
      # AWS 자격증명 — S3(skn28-cozy) 접근용. 팀 계정(071853465256) 자격증명 필요
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-2}
      - QDRANT_URL=${QDRANT_URL:-http://host.docker.internal:6333}
      # Code 노드가 배치 파일을 읽고 쓸 때 필요한 Node.js 기본 모듈
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      # 로컬(비 HTTPS) 접근 시 쿠키 보안 완화
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      # compose 위치(data/pipeline/n8n) 기준 레포 루트를 워크플로의 /repo 경로에 RW 연결
      # (2026-07-13 :ro → :rw — 룰 빌드 워크플로 04·05가 컨테이너에서 룰 JSON을 직접 갱신)
      # compose 가 data/pipeline/n8n/ 에 있으므로 .. 3번 = 레포 루트 (../../.. = data/pipeline/n8n → 레포 루트)
      - ../../..:/repo:rw

volumes:
  n8n_data:
